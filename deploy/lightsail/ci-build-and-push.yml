# Move this file to .github/workflows/ci-build-and-push.yml to enable GitHub Actions
# Workflow: builds frontend/backend Docker images and pushes to GitHub Container Registry (GHCR)
name: Build and push Docker images

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/carevance-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/carevance-frontend:latest

# Notes:
# - After moving this file to .github/workflows/, grant the repo packages:write permission to the workflow runner (GITHUB_TOKEN has sufficient rights by default for same-org pushes).
# - For improved reproducibility, tag images with commit SHA or semver and update docker-compose.production.yml accordingly.
