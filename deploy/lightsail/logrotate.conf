# Logrotate config for CareVance app logs
# Adjust paths to match your deployment
/path/to/your/project/*/*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

# To enable: copy this file to /etc/logrotate.d/carevance (requires sudo) and update paths above.
