version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Performance optimizations
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - carevance
    # Resource limits for Lightsail
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  backend:
    image: ghcr.io/${GITHUB_OWNER:-your-org}/carevance-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 10000
      DB_HOST: db
      DB_PORT: 5432
      # Performance settings
      DB_PERSISTENT_CONNECTIONS: "true"
      DB_POOL_SIZE: "10"
      DB_POOL_MIN: "2"
      DB_POOL_MAX: "20"
      # PHP optimizations
      PHP_MEMORY_LIMIT: "512M"
      PHP_MAX_EXECUTION_TIME: "300"
      PHP_MAX_INPUT_VARS: "3000"
      # OPcache settings
      PHP_OPCACHE_ENABLE: "1"
      PHP_OPCACHE_MEMORY_CONSUMPTION: "128"
      PHP_OPCACHE_MAX_ACCELERATED_FILES: "10000"
      # Cache settings
      CACHE_DRIVER: "file"
      SESSION_DRIVER: "file"
      QUEUE_CONNECTION: "sync"
      # Log level
      LOG_LEVEL: "warning"
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-8000}:10000"
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - carevance
    # Resource limits for Lightsail
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  queue:
    image: ghcr.io/${GITHUB_OWNER:-your-org}/carevance-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_PERSISTENT_CONNECTIONS: "true"
      PHP_MEMORY_LIMIT: "256M"
      CACHE_DRIVER: "file"
      SESSION_DRIVER: "file"
      QUEUE_CONNECTION: "database"
    command: ["sh", "-lc", "php artisan queue:work --tries=3 --timeout=60 --memory=256 --sleep=3 --rest=1"]
    depends_on:
      - db
      - backend
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - carevance
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  frontend:
    image: ghcr.io/${GITHUB_OWNER:-your-org}/carevance-frontend:latest
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_WEB_APP_URL: ${VITE_WEB_APP_URL}
      VITE_DESKTOP_DOWNLOAD_URL: ${VITE_DESKTOP_DOWNLOAD_URL}
      VITE_DESKTOP_DOWNLOAD_LABEL: ${VITE_DESKTOP_DOWNLOAD_LABEL}
      VITE_IDLE_TRACK_THRESHOLD_SECONDS: ${VITE_IDLE_TRACK_THRESHOLD_SECONDS}
      VITE_IDLE_AUTO_STOP_THRESHOLD_SECONDS: ${VITE_IDLE_AUTO_STOP_THRESHOLD_SECONDS}
      VITE_IDLE_GUARD_INTERVAL_MS: ${VITE_IDLE_GUARD_INTERVAL_MS}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - carevance
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  postgres_data:
  backend_storage:

networks:
  carevance:
    driver: bridge

# NOTE: 
# 1. Set GITHUB_OWNER environment variable or replace 'your-org' with your GitHub org/user.
# 2. After images are pushed by CI, deploy on Lightsail by pulling images (docker-compose -f docker-compose.production.yml pull) and then docker-compose up -d
# 3. This configuration is optimized for AWS Lightsail with limited memory (2GB total)
# 4. Database persistent connections are enabled for better performance
# 5. OPcache is enabled for PHP performance
